# Deploy Streamlit dashboard only to Cornell Posit Connect.
# Backend is hosted on Render; set BACKEND_BASE_URL to your Render URL.
# Triggers: push to main, or manual workflow_dispatch.
# Requires: CONNECT_SERVER, CONNECT_API_KEY, BACKEND_BASE_URL (Render backend URL).

name: Deploy Dashboard to Posit Connect

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-dashboard:
    name: Deploy Dashboard (Streamlit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rsconnect-python
        run: pip install rsconnect-python

      - name: Write dashboard .env
        working-directory: dashboard
        run: |
          echo "BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }}" > .env

      - name: Deploy dashboard to Posit Connect
        working-directory: dashboard
        env:
          CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
          CONNECT_DASHBOARD_APP_ID: ${{ secrets.CONNECT_DASHBOARD_APP_ID }}
        run: |
          EXTRA=""
          if [ -n "$CONNECT_DASHBOARD_APP_ID" ]; then
            EXTRA="--app-id $CONNECT_DASHBOARD_APP_ID"
          fi
          rsconnect deploy streamlit . \
            --server "$CONNECT_SERVER" \
            --api-key "$CONNECT_API_KEY" \
            --entrypoint app.py \
            --title "City Congestion Tracker Dashboard" \
            $EXTRA
